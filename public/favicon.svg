<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 140" width="100%" height="100%">
  <defs>
    <style>
      .shield { fill: none; stroke: #d4a346; stroke-width: 10; stroke-linejoin: round; stroke-linecap: round; }
      .swoosh { fill: none; stroke: #d4a346; stroke-width: 10; stroke-linecap: round; }
    </style>
  </defs>
  
  <g transform="translate(15, 5)">
    <!-- Base shield shape -->
    <path class="shield" d="M 50 10 L 95 25 V 65 C 95 100 50 125 50 125 C 50 125 5 100 5 65 V 25 Z" />
    
    <!-- Overlapping sweeping road vectors -->
    <path class="swoosh" d="M 5 80 Q 55 35 115 50" />
    <path class="swoosh" d="M 35 117 C 45 70 65 55 115 50" />
  </g>
</svg>
