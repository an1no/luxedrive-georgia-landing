<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 140" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;display=swap');
      .shield { fill: none; stroke: #d4a346; stroke-width: 8; stroke-linejoin: round; stroke-linecap: round; }
      .swoosh { fill: none; stroke: #d4a346; stroke-width: 8; stroke-linecap: round; }
      .text-midi { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 42px; fill: #d4a346; letter-spacing: 2px; }
      .text-geo { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 16px; fill: #d4a346; letter-spacing: 8px; }
    </style>
  </defs>
  
  <!-- Shield Icon -->
  <g transform="translate(15, 5)">
    <!-- Base shield shape -->
    <path class="shield" d="M 50 10 L 95 25 V 65 C 95 100 50 125 50 125 C 50 125 5 100 5 65 V 25 Z" />
    
    <!-- Overlapping sweeping road vectors -->
    <path class="swoosh" d="M 5 80 Q 55 35 115 50" />
    <path class="swoosh" d="M 35 117 C 45 70 65 55 115 50" />
  </g>

  <!-- Text aligned next to the shield -->
  <text x="140" y="80" class="text-midi">MIDI TRAVEL</text>
  <text x="145" y="112" class="text-geo">GEORGIA</text>
</svg>
